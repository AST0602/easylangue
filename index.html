<script>
        // Storage Logic
        function saveSettings() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const baseUrl = document.getElementById('baseUrl').value.trim();
            localStorage.setItem('ai_api_key', apiKey);
            // 如果用户没填 Base URL，默认帮其填入 DeepSeek 官方接口地址
            localStorage.setItem('ai_base_url', baseUrl || 'https://api.deepseek.com/v1');
            toggleModal(false);
            alert('DeepSeek 配置已安全保存在本地！');
        }

        function loadSettings() {
            document.getElementById('apiKey').value = localStorage.getItem('ai_api_key') || '';
            document.getElementById('baseUrl').value = localStorage.getItem('ai_base_url') || 'https://api.deepseek.com/v1';
        }

        function toggleModal(show) {
            document.getElementById('modalOverlay').style.display = show ? 'flex' : 'none';
            if(show) loadSettings();
        }

        // AI Request Logic
        const mainInput = document.querySelector('.main-input');
        
        mainInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && mainInput.value.trim()) {
                handleAIRequest(mainInput.value.trim());
            }
        });

        async function handleAIRequest(userInput) {
            const apiKey = localStorage.getItem('ai_api_key');
            let baseUrl = localStorage.getItem('ai_base_url') || 'https://api.deepseek.com/v1';

            if (!apiKey) {
                alert('请先点击左下角设置，配置您的 DeepSeek API Key');
                toggleModal(true);
                return;
            }

            // 规范化路径：防止结尾多出 /
            if (baseUrl.endsWith('/')) {
                baseUrl = baseUrl.slice(0, -1);
            }

            // 获取卡片顶部的标签状态（口语、书面、礼貌、随意）
            const activeTones = Array.from(document.querySelectorAll('.tag-btn.active'))
                                   .map(btn => btn.innerText);
            
            let finalPrompt = userInput;
            if (activeTones.length > 0) {
                finalPrompt += `（请注意：翻译和例句需特别符合【${activeTones.join('、')}】的语境和表达习惯）`;
            }

            // 触发优雅的骨架屏闪烁
            renderLoading();

            const systemPrompt = `你是一个精通中、英、法的三语语言学习专家。
你的任务是对用户输入的内容进行地道的互译、润色和语言点拓展。
- 如果输入是【单词或词组】：返回它在中、英、法三语中的核心意思、音标，并附带 1-2 个实用的双语例句或语法注意点。
- 如果输入是【完整的长句子】：直接提供地道、符合语境的三语互译，并在 extra 中简要说明句子中的核心短语、语法现象或表达语气。

请必须严格以 JSON 格式返回数据。绝对不要包含任何 Markdown 格式包裹（例如不要带 \`\`\`json 标记），确保内容可以直接被解析。
JSON 结构必须严格如下：
{
  "zh": { "content": "中文核心翻译或词条", "extra": "音标 / 实用例句 / 补充说明" },
  "en": { "content": "English translation or word", "extra": "Phonetic / Example sentences / Usage" },
  "fr": { "content": "Traduction en français", "extra": "Phonétique / Exemples / Remarques" }
}`;

            try {
                const response = await fetch(`${baseUrl}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat", // 强行指定 DeepSeek 模型名字
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: finalPrompt }
                        ],
                        // 开启 DeepSeek 的纯 JSON 输出模式
                        response_format: { type: "json_object" },
                        temperature: 0.3
                    })
                });

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`HTTP 错误! 状态码: ${response.status}, 原因: ${errText}`);
                }

                const data = await response.json();
                
                // 安全清洗：以防部分第三方中转渠道强行给 JSON 加上了 Markdown 代码块
                let rawContent = data.choices[0].message.content.trim();
                if (rawContent.startsWith("```")) {
                    rawContent = rawContent.replace(/^```json/, "").replace(/^```/, "").replace(/```$/, "").trim();
                }

                const result = JSON.parse(rawContent);
                renderResults(result);

            } catch (error) {
                console.error('DeepSeek Request Error:', error);
                alert(`请求失败：${error.message}\n请确认设置里填写的是 DeepSeek 官方或正确的代理地址。`);
                resetCards();
            }
        }

        function renderLoading() {
            document.querySelectorAll('.card-content').forEach(el => {
                el.innerHTML = '<div class="loading-shimmer"></div><div class="loading-shimmer" style="width:80%"></div><div class="loading-shimmer" style="width:50%"></div>';
            });
        }

        function renderResults(data) {
            const mappings = {
                '中文': data.zh,
                'ENGLISH': data.en,
                'FRANÇAIS': data.fr
            };

            document.querySelectorAll('.result-card').forEach(card => {
                const label = card.querySelector('.lang-label').innerText.trim().toUpperCase();
                const content = card.querySelector('.card-content');
                
                let langData = mappings[label];
                if (label === '中文') langData = mappings['中文'];

                if (langData) {
                    // 把大模型返回的文本中的换行符 \\n 转换成网页的 <br> 标签，排版更美观
                    const formattedExtra = langData.extra ? langData.extra.replace(/\n/g, '<br>') : '';
                    content.innerHTML = `
                        <div style="font-weight: 600; font-size: 1.3rem; margin-bottom: 12px; color: var(--text-primary);">${langData.content}</div>
                        <div style="font-size: 0.95rem; color: var(--text-secondary); line-height: 1.5; background: #F9F9FB; padding: 12px; border-radius: 8px;">${formattedExtra}</div>
                    `;
                }
            });
        }

        function resetCards() {
            document.querySelectorAll('.card-content').forEach(el => {
                el.innerText = '等待输入...';
            });
        }
    </script>
