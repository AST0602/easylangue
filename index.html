<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Language Tool</title>
    <style>
        :root {
            --bg-color: #F5F5F7;
            --card-color: #FFFFFF;
            --text-primary: #2C2C2E;
            --text-secondary: #8E8E93;
            --border-radius: 16px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 40px 20px;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        /* 顶部标题与设置按钮 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .settings-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: var(--transition);
        }
        .settings-btn:hover {
            transform: rotate(45deg);
            color: var(--text-primary);
        }

        /* 配置面板样式 */
        .config-panel {
            background: var(--card-color);
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            display: none;
        }
        .config-panel.show {
            display: block;
        }
        .config-group {
            margin-bottom: 15px;
        }
        .config-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
            font-weight: 500;
        }
        .config-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #E5E5EA;
            border-radius: 10px;
            font-size: 0.9rem;
            outline: none;
        }

        /* 输入框样式 */
        .input-box {
            width: 100%;
            background: var(--card-color);
            border: none;
            border-radius: var(--border-radius);
            padding: 20px;
            font-size: 1.1rem;
            color: var(--text-primary);
            box-shadow: var(--shadow);
            margin-bottom: 25px;
            outline: none;
            transition: var(--transition);
            resize: none;
        }
        .input-box:focus {
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.08);
        }

        /* 卡片区域 */
        .results-grid {
            display: grid;
            gap: 20px;
            margin-bottom: 40px;
        }

        .result-card {
            background: var(--card-color);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            position: relative;
        }

        .lang-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-secondary);
            letter-spacing: 1px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .card-content {
            font-size: 1.1rem;
            min-height: 60px;
            color: var(--text-primary);
        }

        /* 底部动作条 */
        .action-bar {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
        }

        .btn {
            background: #007AFF;
            color: #FFFFFF;
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.2);
        }
        .btn:hover {
            background: #0062CC;
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: #E5E5EA;
            color: var(--text-primary);
            box-shadow: none;
        }
        .btn-secondary:hover {
            background: #D1D1D6;
        }

        /* 骨架屏加载动画 */
        .loading-shimmer {
            background: linear-gradient(90deg, #F2F2F7 25%, #E5E5EA 37%, #F2F2F7 63%);
            background-size: 400% 100%;
            animation: shimmer 1.4s ease infinite;
            height: 20px;
            margin-bottom: 10px;
            border-radius: 4px;
        }

        @keyframes shimmer {
            0% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Easylangue 工具</h1>
            <button class="settings-btn" id="toggleConfigBtn" title="配置密钥">⚙️</button>
        </div>

        <div class="config-panel" id="configPanel">
            <div class="config-group">
                <label>LLM API Key (OpenAI格式)</label>
                <input type="password" id="apiKeyInput" placeholder="sk-...">
            </div>
            <div class="config-group">
                <label>Notion Token</label>
                <input type="password" id="notionTokenInput" placeholder="secret_...">
            </div>
            <div class="config-group">
                <label>Notion Database ID</label>
                <input type="text" id="databaseIdInput" placeholder="32位字符串">
            </div>
            <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 0.85rem;" id="saveConfigBtn">保存配置</button>
        </div>

        <textarea class="input-box" id="srcInput" rows="3" placeholder="在此输入想要处理的单词或句子..."></textarea>

        <div class="results-grid">
            <div class="result-card">
                <div class="lang-label">中文</div>
                <div class="card-content" id="card-zh">等待输入...</div>
            </div>
            <div class="result-card">
                <div class="lang-label">English</div>
                <div class="card-content" id="card-en">等待输入...</div>
            </div>
            <div class="result-card">
                <div class="lang-label">Français</div>
                <div class="card-content" id="card-fr">等待输入...</div>
            </div>
        </div>

        <div class="action-bar">
            <button class="btn btn-secondary" onclick="resetCards()">清空</button>
            <button class="btn" id="submitBtn">分析并同步</button>
        </div>
    </div>

    <script>
        // 页面初始化：读取本地缓存的 Key
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('apiKeyInput').value = localStorage.getItem('LLM_API_KEY') || '';
            document.getElementById('notionTokenInput').value = localStorage.getItem('NOTION_TOKEN') || '';
            document.getElementById('databaseIdInput').value = localStorage.getItem('NOTION_DB_ID') || '';
        });

        // 切换面板显示/隐藏
        document.getElementById('toggleConfigBtn').addEventListener('click', () => {
            document.getElementById('configPanel').classList.toggle('show');
        });

        // 保存配置到浏览器本地
        document.getElementById('saveConfigBtn').addEventListener('click', () => {
            const apiKey = document.getElementById('apiKeyInput').value.trim();
            const notionToken = document.getElementById('notionTokenInput').value.trim();
            const dbId = document.getElementById('databaseIdInput').value.trim();

            localStorage.setItem('LLM_API_KEY', apiKey);
            localStorage.setItem('NOTION_TOKEN', notionToken);
            localStorage.setItem('NOTION_DB_ID', dbId);

            alert('配置已安全保存在本地浏览器！');
            document.getElementById('configPanel').classList.remove('show');
        });

        // 提交触发
        document.getElementById('submitBtn').addEventListener('click', async () => {
            const text = document.getElementById('srcInput').value.trim();
            if (!text) return alert('请输入内容！');

            // 动态读取本地存储的密钥
            const apiKey = localStorage.getItem('LLM_API_KEY');
            const notionToken = localStorage.getItem('NOTION_TOKEN');
            const dbId = localStorage.getItem('NOTION_DB_ID');

            if (!apiKey) {
                document.getElementById('configPanel').classList.add('show');
                return alert('请先点击右上角齿轮，配置您的 API Key！');
            }

            renderLoading();

            try {
                // 1. 请求大模型进行多语言翻译和拓展
                // 提示：此处配合你的 API 提供商端点，默认以大模型常用标准格式为例
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-4o-mini', // 或者你常用的模型
                        response_format: { type: "json_object" },
                        messages: [
                            {
                                role: 'system',
                                content: '你是一个多语言语言学习助手。请将输入的文本进行处理。必须返回 JSON 格式，包含 zh, en, fr 三个键，每个键下包含 content（核心翻译）和 extra（语境/例句拓展/语法点解释）。'
                            },
                            { role: 'user', content: text }
                        ]
                    })
                });

                const resData = await response.json();
                const aiResult = JSON.parse(resData.choices[0].message.content);
                
                // 渲染结果到卡片
                renderResults(aiResult);

                // 2. 如果配置了 Notion，则尝试同步到 Notion 
                // ⚠️ 提示：在纯前端直接 Fetch Notion 官方 API 会遭遇跨域（CORS）限制。
                // 如果需要直接使用，建议配置 Notion Integration 并通过中转，或直接在此处查看分析结果。
                if (notionToken && dbId) {
                    console.log('检测到 Notion 配置，准备进行同步...', { aiResult });
                    // 实际项目中由于跨域限制，通常在此处调用 Vercel / Cloudflare Workers 等中转，此处留作扩展
                }

            } catch (error) {
                console.error('AI Request Error:', error);
                alert('请求失败，请检查 API 配置或网络');
                resetCards();
            }
        });

        function renderLoading() {
            document.querySelectorAll('.card-content').forEach(el => {
                el.innerHTML = '<div class="loading-shimmer"></div><div class="loading-shimmer" style="width:80%"></div>';
            });
        }

        function renderResults(data) {
            if(data.zh) {
                document.getElementById('card-zh').innerHTML = `<strong>${data.zh.content}</strong><br><small style="color:var(--text-secondary)">${data.zh.extra || ''}</small>`;
            }
            if(data.en) {
                document.getElementById('card-en').innerHTML = `<strong>${data.en.content}</strong><br><small style="color:var(--text-secondary)">${data.en.extra || ''}</small>`;
            }
            if(data.fr) {
                document.getElementById('card-fr').innerHTML = `<strong>${data.fr.content}</strong><br><small style="color:var(--text-secondary)">${data.fr.extra || ''}</small>`;
            }
        }

        function resetCards() {
            document.getElementById('srcInput').value = '';
            document.querySelectorAll('.card-content').forEach(el => {
                el.innerText = '等待输入...';
            });
        }
    </script>
</body>
</html>
